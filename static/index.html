<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Live Captions · JA→EN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #FFE066;
      --bg:       #0a0a0a;
      --surface:  #161616;
      --border:   #2a2a2a;
      --dim:      #555;
      --red:      #f44336;
      --green:    #4caf50;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP',
                   'Noto Sans JP', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Connection status */
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--dim);
      white-space: nowrap;
    }

    #dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #dot.ok    { background: var(--green); }
    #dot.error { background: var(--red); }

    /* Mic button */
    #mic-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn:hover  { border-color: #555; color: #aaa; }

    #mic-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      animation: pulse-ring 1.4s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(244,67,54,0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(244,67,54,0); }
      100% { box-shadow: 0 0 0 0 rgba(244,67,54,0); }
    }

    #mic-btn svg { width: 18px; height: 18px; }

    /* Toast for HTTPS warning */
    #toast {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #eee;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.85rem;
      text-align: center;
      max-width: min(340px, 90vw);
      line-height: 1.5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }
    #toast.show { opacity: 1; }
    #toast code { background: #333; padding: 1px 5px; border-radius: 4px; }

    /* ── Caption history ─────────────────────────────────────────────────── */
    #history {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-msg {
      margin: auto;
      color: var(--dim);
      font-size: 0.9rem;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 12px 15px;
      border-left: 3px solid var(--border);
      opacity: 0.5;
      transition: opacity 0.4s, border-color 0.4s;
    }
    .card.latest { opacity: 1; border-left-color: var(--accent); }

    .card-source {
      font-size: 0.65rem;
      color: var(--dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-source.from-mic { color: #e57373; }

    .card-ja {
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      line-height: 1.65;
      color: #fff;
      margin-bottom: 5px;
    }
    .card-en {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      line-height: 1.55;
      color: var(--accent);
    }

    /* ── Live subtitle bar ───────────────────────────────────────────────── */
    #live-bar {
      flex-shrink: 0;
      background: rgba(0,0,0,0.93);
      border-top: 2px solid var(--accent);
      padding: clamp(14px, 3vw, 22px) clamp(16px, 5vw, 40px);
      padding-bottom: max(clamp(14px, 3vw, 22px), env(safe-area-inset-bottom));
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    #live-ja {
      font-size: clamp(1.15rem, 4.5vw, 2rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.55;
      text-align: center;
    }
    #live-en {
      font-size: clamp(1rem, 4vw, 1.75rem);
      color: var(--accent);
      line-height: 1.5;
      text-align: center;
    }

    #live-ja.dim { color: var(--dim); }
    #live-en.dim { color: var(--dim); }

    /* Tablet / desktop */
    @media (min-width: 640px) {
      #history { padding: 18px 24px; }
      .card    { padding: 14px 18px; }
    }
    @media (min-width: 1024px) {
      #history  { max-width: 900px; width: 100%; margin: 0 auto; }
      #live-bar { padding: 24px 10%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Live Captions &nbsp;·&nbsp; JA → EN</h1>

    <!-- Mic toggle -->
    <button id="mic-btn" title="Use this device's mic">
      <!-- Mic icon (off state) -->
      <svg id="mic-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>

    <!-- Connection status -->
    <div id="status">
      <div id="dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <!-- HTTPS warning toast -->
  <div id="toast"></div>

  <div id="history">
    <p class="empty-msg">Captions will appear here once audio is detected.</p>
  </div>

  <div id="live-bar">
    <div id="live-ja" class="dim">Listening…</div>
    <div id="live-en" class="dim"></div>
  </div>

  <script>
    /* ── Element refs ───────────────────────────────────────────────────── */
    const historyEl  = document.getElementById('history');
    const liveJa     = document.getElementById('live-ja');
    const liveEn     = document.getElementById('live-en');
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const micBtn     = document.getElementById('mic-btn');
    const toast      = document.getElementById('toast');

    /* ── State ──────────────────────────────────────────────────────────── */
    let ws               = null;
    let lastOriginal     = '';
    let reconnectDelay   = 1000;
    let isMicActive      = false;
    let audioCtx         = null;
    let micStream        = null;
    let scriptProcessor  = null;
    let nativeSampleRate = 44100;

    /* ── Toast helper ───────────────────────────────────────────────────── */
    let toastTimer = null;
    function showToast(html, durationMs = 5000) {
      toast.innerHTML = html;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), durationMs);
    }

    /* ── Status helpers ─────────────────────────────────────────────────── */
    function setStatus(state, label) {
      dot.className        = state;
      statusText.textContent = label;
    }

    /* ── History helpers ────────────────────────────────────────────────── */
    function addCard(original, translation, fromMic) {
      const ph = historyEl.querySelector('.empty-msg');
      if (ph) ph.remove();

      const prev = historyEl.querySelector('.card.latest');
      if (prev) prev.classList.remove('latest');

      const card = document.createElement('div');
      card.className = 'card latest';

      if (fromMic) {
        const src = document.createElement('div');
        src.className    = 'card-source from-mic';
        src.textContent  = '🎙 Phone mic';
        card.appendChild(src);
      }

      const jaDiv = document.createElement('div');
      jaDiv.className   = 'card-ja';
      jaDiv.textContent = original;

      const enDiv = document.createElement('div');
      enDiv.className   = 'card-en';
      enDiv.textContent = translation;

      card.appendChild(jaDiv);
      card.appendChild(enDiv);
      historyEl.appendChild(card);
      historyEl.scrollTop = historyEl.scrollHeight;

      const cards = historyEl.querySelectorAll('.card');
      if (cards.length > 60) cards[0].remove();
    }

    function updateLatestCard(original, translation) {
      const latest = historyEl.querySelector('.card.latest');
      if (!latest) return;
      latest.querySelector('.card-ja').textContent = original;
      latest.querySelector('.card-en').textContent = translation;
    }

    /* ── WebSocket ──────────────────────────────────────────────────────── */
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        setStatus('ok', 'Connected');
        reconnectDelay = 1000;
        liveJa.textContent = 'Listening…';
        liveJa.className   = 'dim';
        liveEn.textContent = '';
        liveEn.className   = 'dim';
      };

      ws.onmessage = ({ data }) => {
        let msg;
        try { msg = JSON.parse(data); } catch { return; }
        const { original, translation } = msg;
        if (!original) return;

        liveJa.textContent = original;
        liveJa.className   = '';
        liveEn.textContent = translation;
        liveEn.className   = '';

        if (original !== lastOriginal) {
          addCard(original, translation, isMicActive);
          lastOriginal = original;
        } else {
          updateLatestCard(original, translation);
        }
      };

      ws.onerror = () => setStatus('error', 'Error');

      ws.onclose = () => {
        setStatus('error', `Reconnecting in ${Math.round(reconnectDelay / 1000)}s…`);
        setTimeout(() => {
          reconnectDelay = Math.min(reconnectDelay * 2, 30_000);
          connect();
        }, reconnectDelay);
      };
    }

    /* ── Mic: PCM capture via ScriptProcessorNode ───────────────────────── */

    /**
     * Downsample a Float32Array from sourceSampleRate to 16 000 Hz.
     * Uses linear interpolation for decent quality.
     */
    function downsampleTo16k(samples, sourceSampleRate) {
      if (sourceSampleRate === 16000) return samples;
      const ratio    = sourceSampleRate / 16000;
      const outLen   = Math.floor(samples.length / ratio);
      const out      = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) {
        const pos  = i * ratio;
        const lo   = Math.floor(pos);
        const hi   = Math.min(lo + 1, samples.length - 1);
        const frac = pos - lo;
        out[i] = samples[lo] * (1 - frac) + samples[hi] * frac;
      }
      return out;
    }

    function float32ToInt16(samples) {
      const out = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) {
        out[i] = Math.max(-32768, Math.min(32767, samples[i] * 32768));
      }
      return out;
    }

    async function startMic() {
      // Mic access requires a secure context (HTTPS or localhost)
      if (!window.isSecureContext) {
        showToast(
          'Microphone needs <strong>HTTPS</strong>.<br>' +
          'Restart the server with <code>--https</code> and open the <code>https://</code> URL.',
          8000
        );
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount:     1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl:  true,
          }
        });
      } catch (err) {
        showToast(`Mic access denied: ${err.message}`, 5000);
        return;
      }

      // AudioContext at the device's native sample rate; we'll downsample in JS
      audioCtx         = new AudioContext();
      nativeSampleRate = audioCtx.sampleRate;

      // Tell the server what sample rate we'll send (always 16 000 after downsampling)
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'audio_config', sample_rate: 16000 }));
      }

      const source   = audioCtx.createMediaStreamSource(micStream);
      // 4096-sample buffer, 1 input channel, 1 output channel
      // Note: ScriptProcessorNode is deprecated but has universal browser support.
      // For a local private app this is fine.
      scriptProcessor = audioCtx.createScriptProcessor(4096, 1, 1);

      scriptProcessor.onaudioprocess = (e) => {
        if (!isMicActive || ws?.readyState !== WebSocket.OPEN) return;
        const raw        = e.inputBuffer.getChannelData(0);
        const downsampled = downsampleTo16k(raw, nativeSampleRate);
        const int16       = float32ToInt16(downsampled);
        ws.send(int16.buffer);
      };

      // Connect: source → processor → silent sink (zero-gain to prevent feedback)
      const silence = audioCtx.createGain();
      silence.gain.value = 0;
      source.connect(scriptProcessor);
      scriptProcessor.connect(silence);
      silence.connect(audioCtx.destination);

      isMicActive = true;
      micBtn.classList.add('active');
      micBtn.title = 'Stop mic';
    }

    function stopMic() {
      scriptProcessor?.disconnect();
      audioCtx?.close().catch(() => {});
      micStream?.getTracks().forEach(t => t.stop());
      scriptProcessor = audioCtx = micStream = null;
      isMicActive = false;
      micBtn.classList.remove('active');
      micBtn.title = 'Use this device\'s mic';
    }

    micBtn.addEventListener('click', () => {
      isMicActive ? stopMic() : startMic();
    });

    /* ── Boot ────────────────────────────────────────────────────────────── */
    connect();
  </script>
</body>
</html>
